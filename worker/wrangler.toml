name = "secondbrain-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"
# Needed by the argon2id (hash-wasm) password hashing landing in M1, and by
# anything reaching for node: builtins later.
compatibility_flags = ["nodejs_compat"]

# Workers logs, so a 500 in production is diagnosable without adding a logging
# service. Off by default; there is no reason to run without it.
#
# This IS the error monitoring for this project, and that is a decision rather
# than a gap: every hosted alternative is another account, most want a card, and
# the failure this catches (a 500 a user reports by its X-Request-Id) is found
# just as fast with `wrangler tail`. What makes it work is that the error
# handler in src/index.ts logs method and routed path with the id — see the
# comment there, and note it deliberately never logs a URL or a body.
[observability]
enabled = true

# ---------------------------------------------------------------------------
# D1 read replication is deliberately NOT enabled.
#
# It is free and one line (`read_replication = { mode = "auto" }`), which makes
# it tempting. Two reasons not to:
#
#   1. It doesn't help the measured problem. The ~105 ms per query recorded in
#      docs/cloud-migration-plan.md §10 is a round-trip to a primary in the same
#      region as the caller. A replica nearer than "already next to you" does
#      not exist.
#   2. Turning it on without also adopting D1's Sessions API means reads can
#      land on a replica that has not caught up, so a client that just wrote a
#      todo can immediately read a list without it. This app writes and then
#      re-reads constantly — every checkbox tick — so that is not an edge case,
#      it is the main flow, and it would present as "my change didn't save".
#
# Revisit when there are users far from the primary, and adopt the Sessions API
# in the same change, not after it.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Top level = local development (`npm run dev -w worker`). `wrangler dev` runs
# D1 in Miniflare against .wrangler/state, so nothing here touches the
# Cloudflare account and `database_id` is ignored locally — it only has to be
# present. Replace it before the first remote deploy (see worker/README.md).
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "secondbrain-dev"
database_id = "REPLACE_ME_AFTER_wrangler_d1_create"
migrations_dir = "migrations"

# Note-image bytes (D1 caps a row at 2 MB). KV rather than R2: enabling R2
# requires a payment method on the Cloudflare account even for its free tier,
# and keeping no card on file is what guarantees a traffic spike can never
# become a bill. See worker/src/db/images.ts for the full trade-off.
#
# Locally, `wrangler dev` simulates KV in .wrangler/state, so `id` is ignored
# and only has to be present. Create the real namespace before the first remote
# deploy: `wrangler kv namespace create IMAGES`.
[[kv_namespaces]]
binding = "IMAGES"
id = "REPLACE_ME_AFTER_wrangler_kv_namespace_create"

# ---------------------------------------------------------------------------
# Per-user caps on the routes that reach somebody else's server.
#
# Cloudflare's rate-limiting binding rather than a D1 counter: it runs in-colo
# in about a millisecond, where a D1 row would add a ~105 ms round-trip to the
# primary to every relayed CalDAV call — dozens per calendar refresh — and
# spend write quota doing it. It is included in the Workers free plan and needs
# no card, which the alternatives (a Durable Object per user) do not manage as
# cleanly. See worker/src/rateLimit.ts for why per-colo counting is the right
# trade here, and note the binding must be repeated under every [env.*] block:
# wrangler does NOT inherit bindings into named environments, and a missing one
# is a hard failure at request time by design.
#
# `namespace_id` is an arbitrary number that names the counter; changing one
# resets it. `period` may only be 10 or 60.
# ---------------------------------------------------------------------------
[[ratelimits]]
name = "DAV_LIMIT"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

[[ratelimits]]
name = "QUOTE_LIMIT"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

# The RSS relay. Higher than the others because a Today page load costs one
# request per subscribed feed (the client caches for 30 minutes on top), and
# because this one moves whole documents rather than a JSON quote — the cap is
# what stops a stolen session using it as a general-purpose fetcher.
[[ratelimits]]
name = "FEED_LIMIT"
namespace_id = "1004"
simple = { limit = 60, period = 60 }

# Outbound mail. Low on purpose — this one is spent by strangers (anyone can
# ask for a reset link for any address), it costs real money at the provider,
# and it lands in somebody else's inbox.
[[ratelimits]]
name = "EMAIL_LIMIT"
namespace_id = "1003"
simple = { limit = 3, period = 60 }

[vars]
ENVIRONMENT = "development"
# Comma-separated. Tauri's webview origin differs by OS — `tauri://localhost`
# on macOS/iOS, `http://tauri.localhost` on Windows/Android — so both are
# always allowed or the app breaks on half its target platforms.
ALLOWED_ORIGINS = "http://localhost:1420,http://localhost:1421,tauri://localhost,http://tauri.localhost"
# Where reset/verification links point. Taken from config, never from the
# request's Origin header — a link is minted from this value, and reading it
# from something the caller controls would let anyone have us mail a live token
# aimed at their own site. No trailing slash.
APP_URL = "http://localhost:1420"
EMAIL_FROM = "Sekunda <onboarding@resend.dev>"

# ---------------------------------------------------------------------------
# Staging
# ---------------------------------------------------------------------------
[env.staging]
name = "secondbrain-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "secondbrain-staging"
database_id = "93de0ce1-c6a7-45a0-bbbb-60ca2cccb6b8"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "IMAGES"
id = "239ecd43e0f14fc082db5819701fd892"

# Repeated, not inherited — see the top-level block.
[[env.staging.ratelimits]]
name = "DAV_LIMIT"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

[[env.staging.ratelimits]]
name = "QUOTE_LIMIT"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[[env.staging.ratelimits]]
name = "FEED_LIMIT"
namespace_id = "1004"
simple = { limit = 60, period = 60 }

[[env.staging.ratelimits]]
name = "EMAIL_LIMIT"
namespace_id = "1003"
simple = { limit = 3, period = 60 }

[env.staging.vars]
ENVIRONMENT = "staging"
# The published web build. A reset link is only useful where the app actually
# runs, and the desktop build can't receive one — a user resets on the web and
# then signs in on the desktop with the new password.
APP_URL = "https://elliottjonestw.github.io/sekunda-web"
# An address on the mandachinese.com domain, verified in Resend. The Resend
# free plan allows one verified domain, so staging and production share it —
# fine, because the address only appears in the From line, not as a routing
# key. This replaces the sandbox onboarding@resend.dev, which delivers only to
# the Resend account owner; a verified-domain sender is what lets reset and
# confirmation mail reach real users.
EMAIL_FROM = "Sekunda <sekunda@mandachinese.com>"
# The web build is served from GitHub Pages by .github/workflows/web.yml.
# Its ORIGIN is the pages host only — no path, no trailing slash — so a
# project site at .../sekunda-web/ is still just the github.io origin.
# Using a custom domain later means adding it here and redeploying;
# a missing origin looks like every request failing for no reason.
ALLOWED_ORIGINS = "tauri://localhost,http://tauri.localhost,https://elliottjonestw.github.io"

[env.staging.observability]
enabled = true

# ---------------------------------------------------------------------------
# Production
# ---------------------------------------------------------------------------
[env.production]
name = "secondbrain-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "secondbrain-prod"
database_id = "ceca277b-0fcf-4999-b213-bc1587917d87"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "IMAGES"
id = "5f4698a44ab74ee98889b629a1b4f17b"

# Repeated, not inherited — see the top-level block.
[[env.production.ratelimits]]
name = "DAV_LIMIT"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

[[env.production.ratelimits]]
name = "QUOTE_LIMIT"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[[env.production.ratelimits]]
name = "FEED_LIMIT"
namespace_id = "1004"
simple = { limit = 60, period = 60 }

[[env.production.ratelimits]]
name = "EMAIL_LIMIT"
namespace_id = "1003"
simple = { limit = 3, period = 60 }

[env.production.vars]
ENVIRONMENT = "production"
APP_URL = "https://elliottjonestw.github.io/sekunda-web"
# See the staging block: the mandachinese.com sender, verified in Resend.
EMAIL_FROM = "Sekunda <sekunda@mandachinese.com>"
# The web build is served from GitHub Pages by .github/workflows/web.yml.
# Its ORIGIN is the pages host only — no path, no trailing slash — so a
# project site at .../sekunda-web/ is still just the github.io origin.
# Using a custom domain later means adding it here and redeploying;
# a missing origin looks like every request failing for no reason.
ALLOWED_ORIGINS = "tauri://localhost,http://tauri.localhost,https://elliottjonestw.github.io"

[env.production.observability]
enabled = true
